<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghi Chép Rời</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F0E8;
    --paper:#FBFAF6;
    --ink:#1E201B;
    --muted:#726E62;
    --faint:#9B9686;
    --line:#DCD8C9;
    --accent:#33544A;
    --accent-2:#8C5E2D;
    --radius:3px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:660px;
    margin:0 auto;
    padding:64px 24px 120px;
  }
  header.site{margin-bottom:56px;}
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:34px;
    letter-spacing:-0.01em;
  }
  h1.title a{color:inherit;text-decoration:none;}
  .tagline{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
    letter-spacing:0.02em;
  }
  .filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:28px;
  }
  .pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:5px 11px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--muted);
    cursor:pointer;
    background:transparent;
    letter-spacing:0.02em;
  }
  .pill.active{
    background:var(--accent-2);
    border-color:var(--accent-2);
    color:#FBF3E9;
  }

  .spine{
    position:relative;
    padding-left:26px;
    margin-top:44px;
  }
  .spine::before{
    content:"";
    position:absolute;
    left:5px;
    top:6px;
    bottom:6px;
    width:1px;
    background:var(--line);
  }
  .entry{
    position:relative;
    padding:0 0 34px;
    cursor:pointer;
  }
  .entry::before{
    content:"";
    position:absolute;
    left:-25px;
    top:7px;
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--paper);
    border:1.5px solid var(--accent);
  }
  .entry-meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--faint);
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:6px;
  }
  .entry-meta .cat{color:var(--accent-2);}
  .entry h2{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-style:italic;
    font-size:23px;
    margin-bottom:6px;
    line-height:1.3;
  }
  .entry p.excerpt{
    color:var(--muted);
    font-size:14.5px;
    max-width:56ch;
  }
  .entry:hover h2{color:var(--accent);}

  .empty{
    padding:60px 0;
    text-align:center;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
  }

  .post-view{display:none;}
  .post-view .back{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    display:inline-block;
    margin-bottom:32px;
  }
  .post-view .back:hover{color:var(--accent);}
  .post-view .entry-meta{margin-bottom:14px;}
  .post-view h1.post-title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-style:italic;
    font-size:36px;
    line-height:1.22;
    margin-bottom:28px;
  }
  .post-body{
    font-size:16.5px;
    color:#2A2C25;
  }
  .post-body p{margin-bottom:20px;}

  footer.site{
    margin-top:80px;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--faint);
  }

  @media(max-width:520px){
    .wrap{padding:40px 18px 90px;}
    h1.title{font-size:28px;}
    .post-view h1.post-title{font-size:28px;}
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="site">
    <h1 class="title"><a href="#" onclick="showList();return false;">Ghi Chép Rời</a></h1>
    <div class="tagline">một góc nhỏ trên internet — nghĩ gì viết nấy</div>
    <div class="filters" id="filters"></div>
  </header>

  <main class="spine" id="listView"></main>

  <section class="post-view" id="postView">
    <span class="back" onclick="showList()">&larr; quay lại</span>
    <div class="entry-meta" id="postMeta"></div>
    <h1 class="post-title" id="postTitle"></h1>
    <div class="post-body" id="postBody"></div>
  </section>

  <footer class="site" id="footerText"></footer>

</div>

<script src="posts.js"></script>
<script>
let activeFilter = 'Tất cả';

function fmtDate(d){
  const dt = new Date(d + 'T00:00:00');
  const months = ['th1','th2','th3','th4','th5','th6','th7','th8','th9','th10','th11','th12'];
  return dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function cleanContent(raw){
  return raw.trim();
}

function renderFilters(){
  const cats = ['Tất cả', ...new Set(POSTS.map(p=>p.category).filter(Boolean))];
  const el = document.getElementById('filters');
  el.innerHTML = '';
  cats.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'pill' + (c===activeFilter ? ' active' : '');
    btn.textContent = c;
    btn.onclick = ()=>{ activeFilter = c; renderFilters(); renderList(); };
    el.appendChild(btn);
  });
}

function renderList(){
  const el = document.getElementById('listView');
  const sorted = [...POSTS].sort((a,b)=> new Date(b.date) - new Date(a.date));
  const filtered = activeFilter==='Tất cả' ? sorted : sorted.filter(p=>p.category===activeFilter);
  if(filtered.length===0){
    el.innerHTML = '<div class="empty">Chưa có bài viết nào ở chủ đề này.</div>';
    return;
  }
  el.innerHTML = '';
  filtered.forEach((p, i)=>{
    const div = document.createElement('div');
    div.className = 'entry';
    div.onclick = ()=> openPost(p);
    const clean = cleanContent(p.content);
    const excerpt = clean.split('\n').find(l=>l.trim().length>0) || '';
    div.innerHTML = `
      <div class="entry-meta"><span>${fmtDate(p.date)}</span><span class="cat">${escapeHtml(p.category||'chưa phân loại')}</span></div>
      <h2>${escapeHtml(p.title)}</h2>
      <p class="excerpt">${escapeHtml(excerpt.slice(0,120))}${excerpt.length>120?'…':''}</p>
    `;
    el.appendChild(div);
  });
}

function openPost(p){
  document.getElementById('postMeta').innerHTML =
    `<span>${fmtDate(p.date)}</span><span class="cat">${escapeHtml(p.category||'chưa phân loại')}</span>`;
  document.getElementById('postTitle').textContent = p.title;
  const clean = cleanContent(p.content);
  document.getElementById('postBody').innerHTML =
    clean.split(/\n\s*\n+/).map(para=>`<p>${escapeHtml(para.trim()).replace(/\n/g,'<br>')}</p>`).join('');
  document.getElementById('listView').style.display = 'none';
  document.getElementById('filters').style.display = 'none';
  document.getElementById('postView').style.display = 'block';
  window.scrollTo(0,0);
}

function showList(){
  document.getElementById('listView').style.display = 'block';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('postView').style.display = 'none';
}

document.getElementById('footerText').textContent =
  '© ' + new Date().getFullYear() + ' — viết bằng tay, đăng bằng git push';

renderFilters();
renderList();
</script>

</body>
</html>
